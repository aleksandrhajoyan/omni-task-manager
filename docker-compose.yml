services:
  postgres_db:
    image: postgres:16-alpine
    container_name: omni_postgres
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    deploy:
      resources:
        limits:
          memory: 512M

  redis_broker:
    image: redis:7-alpine
    container_name: omni_redis
    restart: always
    ports:
      - "${REDIS_PORT}:6379"
    volumes:
      - redis_data:/data
    deploy:
      resources:
        limits:
          memory: 256M

  backend_api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: omni_backend
    restart: always
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - postgres_db
    deploy:
      resources:
        limits:
          memory: 512M

  telegram_bot:
      build:
        context: ./bot
        dockerfile: Dockerfile
      container_name: omni_bot
      restart: always
      env_file:
        - .env
      depends_on:
        - backend_api
  worker: 
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: omni_worker
    restart: always
    # ВОЗВРАЩАЕМ КАК БЫЛО:
    command: celery -A backend.app.worker.celery_app worker --loglevel=info
    env_file:
      - .env
    depends_on:
      - redis_broker
      - postgres_db
  frontend:
    build:
      context: ./frontend
    container_name: omni_frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - CHOKIDAR_USEPOLLING=true
    restart: always
volumes:
  postgres_data:
  redis_data:
